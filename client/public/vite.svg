<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="32" height="32">
  <defs>
    <linearGradient id="ecoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c853"/>
      <stop offset="100%" stop-color="#a8e063"/>
    </linearGradient>
  </defs>

  <!-- Circular sustainability loop -->
  <path d="M128 20
           A108 108 0 1 1 40 80"
        fill="none"
        stroke="url(#ecoGradient)"
        stroke-width="12"
        stroke-linecap="round"/>

  <!-- Arrow head -->
  <polygon points="40,80 55,75 50,95"
           fill="#00c853"/>

  <!-- Leaf shape -->
  <path d="M128 70
           C90 70, 70 110, 100 150
           C120 180, 160 170, 170 130
           C180 90, 150 70, 128 70 Z"
        fill="url(#ecoGradient)"/>

  <!-- Leaf vein -->
  <path d="M100 150 C120 130, 140 110, 150 90"
        stroke="#ffffff"
        stroke-width="3"
        fill="none"
        stroke-linecap="round"/>
</svg>